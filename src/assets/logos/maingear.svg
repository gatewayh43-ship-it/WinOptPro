<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Maingear: stylized gear/M mark -->
  <rect width="100" height="100" rx="12" fill="#0D0D0D"/>
  <!-- Gear teeth outer ring -->
  <circle cx="50" cy="50" r="38" stroke="#CC0000" stroke-width="6" fill="none"/>
  <circle cx="50" cy="50" r="22" stroke="#CC0000" stroke-width="4" fill="none"/>
  <!-- M -->
  <text x="50" y="62" font-family="Arial Black, sans-serif" font-weight="900" font-size="32" fill="#CC0000" text-anchor="middle">M</text>
</svg>
