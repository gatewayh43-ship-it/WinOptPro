name: Release

# Trigger: git tag v1.0.0 && git push origin v1.0.0
on:
  push:
    tags:
      - 'v*'

# Required GitHub Secrets:
# TAURI_SIGNING_PRIVATE_KEY: content of your generated private key file
# TAURI_SIGNING_PRIVATE_KEY_PASSWORD: passphrase used during key generation

jobs:
  build-windows:
    name: Build & Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install dependencies
        run: npm ci

      - name: Verify no placeholder pubkey
        shell: bash
        run: |
          if grep -q "PLACEHOLDER" src-tauri/tauri.conf.json; then
            echo "ERROR: tauri.conf.json still contains PLACEHOLDER pubkey. Run: npx tauri signer generate"
            exit 1
          fi

      - name: Build signed release
        run: npx tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List artifacts
        shell: bash
        run: |
          find src-tauri/target/release/bundle -name "*.exe" -o -name "*.msi" -o -name "*.msix" -o -name "latest.json" 2>/dev/null || true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          generate_release_notes: true
          files: |
            src-tauri/target/release/bundle/nsis/*.exe
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/msix/*.msix
            src-tauri/target/release/bundle/latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
